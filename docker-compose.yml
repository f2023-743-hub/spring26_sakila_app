services:
 # ──────────────────────────────────────────────────────────
 # Service 1: MySQL database with named volume + healthcheck
 # ──────────────────────────────────────────────────────────
 db:
 image: mysql:8.0
 container_name: sakila-db
 restart: unless-stopped
 environment:
 MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
 MYSQL_DATABASE: ${MYSQL_DATABASE}
 volumes:
 - sakila-db-data:/var/lib/mysql
 networks:
 - sakila-network
 healthcheck:
 test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
 "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
 interval: 10s
 timeout: 5s
 retries: 5
 start_period: 30s
 deploy:
 resources:
 limits:
 memory: 512M
 # ──────────────────────────────────────────────────────────
 # Service 2: Flask application
 # ──────────────────────────────────────────────────────────
 app:
 build:
 context: .
 dockerfile: Dockerfile
 container_name: sakila-app
 restart: on-failure
 deploy:
 restart_policy:
 condition: on-failure
 max_attempts: 5
 ports:
 - "5000:5000"
 environment:
 MYSQL_HOST: db
 MYSQL_USER: ${MYSQL_USER}
 MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
 MYSQL_DB: ${MYSQL_DATABASE}
 networks:
 - sakila-network
 depends_on:
 db:
 condition: service_healthy
 # ──────────────────────────────────────────────────────────
 # Service 3: Adminer — web-based DB management UI
 # ──────────────────────────────────────────────────────────
 db-admin:
 image: adminer:latest
 container_name: sakila-adminer
 restart: unless-stopped
 ports:
 - "8080:8080"
 networks:
 - sakila-network
 depends_on:
 - db
 # ──────────────────────────────────────────────────────────
 # Service 4: Test runner (only runs with --profile test)
 # ──────────────────────────────────────────────────────────
 test-runner:
 build:
 context: .
 dockerfile: Dockerfile
 container_name: sakila-test-runner
 command: python -m pytest tests/ -v
 networks:
 - sakila-network
 depends_on:
 db:
 condition: service_healthy
 environment:
 MYSQL_HOST: db
 MYSQL_USER: ${MYSQL_USER}
 MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
 MYSQL_DB: ${MYSQL_DATABASE}
 profiles:
 - test
# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
 sakila-network:
 driver: bridge
# ──────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────
volumes:
 sakila-db-data
