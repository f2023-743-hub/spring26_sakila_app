name: CI Pipeline
on: 
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install --user flake8
      - run: |
          flake8 . --max-line-length=120 --extend-ignore=E501,W503 --exclude=.git,__pycache__ --count --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports: ["3306:3306"]
        options: --health-cmd="mysqladmin ping -h localhost -u root -padmin" --health-interval=10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: |
          pip install -r requirements.txt pytest
          curl -L -o s.sql https://raw.githubusercontent.com/jOOQ/sakila/main/mysql-sakila-db/mysql-sakila-schema.sql
          curl -L -o d.sql https://raw.githubusercontent.com/jOOQ/sakila/main/mysql-sakila-db/mysql-sakila-insert-data.sql
          sleep 20  # Wait for MySQL to fully initialize
          mysql -h 127.0.0.1 -u root -padmin sakila < s.sql
          mysql -h 127.0.0.1 -u root -padmin sakila < d.sql
      - name: Run pytest
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --maxfail=1

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker build -t sakila-app:${{ github.sha }} .
          docker run -d --name smoke -p 5000:5000 sakila-app:${{ github.sha }}
          sleep 20 && curl -f http://localhost:5000 || echo "App did not start"

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: "sakila-app:${{ github.sha }}"
          format: "table"
          output: "trivy-report.txt"
          exit-code: "0"
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt
